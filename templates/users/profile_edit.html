{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}
{% block content %}<div class="container"><div class="form-page"><h1>Edit Profile</h1>
<form method="post" enctype="multipart/form-data" class="profile-form">{% csrf_token %}
{% for field in form %}<div class="form-group"><label>{{ field.label }}</label>{{ field }}{% for error in field.errors %}<div class="field-error">{{ error }}</div>{% endfor %}</div>{% endfor %}
<div class="form-actions"><button type="submit" class="btn btn-primary">Save</button><a href="{% url 'users:profile' %}" class="btn btn-outline">Cancel</a></div>
</form></div></div>{% endblock %}
