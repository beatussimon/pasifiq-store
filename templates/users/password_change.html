{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}<div class="auth-page"><div class="auth-card">
<h1>Change Password</h1>
<form method="post" class="auth-form">{% csrf_token %}
{% for field in form %}<div class="form-group"><label>{{ field.label }}</label>{{ field }}{% for error in field.errors %}<div class="field-error">{{ error }}</div>{% endfor %}</div>{% endfor %}
<button type="submit" class="btn btn-primary btn-full">Update Password</button></form>
</div></div>{% endblock %}
