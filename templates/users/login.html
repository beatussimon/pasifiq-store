{% extends 'base.html' %}
{% block title %}Login — {{ store_name }}{% endblock %}
{% block content %}
<div class="auth-page"><div class="auth-card">
<div class="auth-header"><span class="auth-icon">🌊</span><h1>Welcome Back</h1><p>Sign in to your account</p></div>
<form method="post" class="auth-form">{% csrf_token %}
{% for error in form.non_field_errors %}<div class="form-error">{{ error }}</div>{% endfor %}
<div class="form-group"><label>Username</label><input type="text" name="username" required autofocus placeholder="Your username"></div>
<div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="Your password"></div>
<button type="submit" class="btn btn-primary btn-full">Login</button></form>
<div class="auth-footer">Don't have an account? <a href="{% url 'users:register' %}">Register here</a></div>
</div></div>{% endblock %}
