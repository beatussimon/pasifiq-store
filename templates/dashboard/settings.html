{% extends 'dashboard/base.html' %}
{% block title %}Store Settings{% endblock %}
{% block page_title %}Store Settings{% endblock %}
{% block content %}
<div class="form-panel">
    <form method="post" enctype="multipart/form-data" class="dashboard-form">
        {% csrf_token %}
        <div class="form-grid-2">
        {% for field in form %}
        <div class="form-group {% if field.field.widget.attrs.rows %}form-group-full{% endif %}">
            <label>{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
        </div>
        {% endfor %}
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Settings</button>
        </div>
    </form>
</div>
{% endblock %}
